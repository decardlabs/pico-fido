<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pico FIDO OTA 升级工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
.card { background: #16213e; border-radius: 12px; padding: 24px; max-width: 640px; margin: 0 auto; }
h1 { font-size: 22px; margin-bottom: 20px; text-align: center; color: #e94560; }
h2 { font-size: 16px; margin: 16px 0 8px; color: #aaa; }
.status { background: #0f3460; border-radius: 8px; padding: 12px; min-height: 80px; font-size: 13px; line-height: 1.6; margin-bottom: 16px; font-family: monospace; overflow-y: auto; max-height: 240px; }
.status .ok { color: #4ecca3; }
.status .err { color: #e94560; }
.status .info { color: #f5a623; }
button { background: #e94560; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; width: 100%; margin-bottom: 8px; }
button:hover { background: #d63851; }
button:disabled { background: #555; cursor: not-allowed; }
button.secondary { background: #0f3460; }
button.secondary:hover { background: #1a4a7a; }
.progress { height: 6px; background: #0f3460; border-radius: 3px; margin: 12px 0; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; background: #4ecca3; border-radius: 3px; transition: width 0.3s; }
input[type="file"] { display: none; }
.file-label { display: block; background: #0f3460; border: 2px dashed #555; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; margin: 8px 0; }
.file-label:hover { border-color: #e94560; }
.file-label .meta { color: #4ecca3; font-size: 12px; margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
<h1>Pico FIDO OTA</h1>
<div class="status" id="log">等待操作...</div>
<button id="btnConnect" onclick="doConnect()">连接设备</button>
<button id="btnInfo" class="secondary" onclick="doInfo()" disabled>查询设备信息</button>
<h2>固件文件</h2>
<label class="file-label" id="fileLabel">
  <div>点击选择 .bin 固件文件</div>
  <div class="meta" id="fileMeta"></div>
</label>
<input type="file" id="fileInput" accept=".bin" onchange="onFileSelect(event)">
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<button id="btnFlash" onclick="doFlash()" disabled>开始 OTA 升级</button>
</div>
<script>
// Protocol constants
const CTAPHID_INIT      = 0x86;  // TYPE_INIT (0x80) | CTAPHID_INIT (0x06)
const CTAP_VENDOR_CBOR  = 0xC1;  // TYPE_INIT (0x80) | (CTAPHID_VENDOR_FIRST + 1)
const CTAP_VENDOR_OTA   = 0x07;

const OTA_CMD_INFO  = 0x01;
const OTA_CMD_WRITE = 0x02;
const OTA_CMD_VERIFY= 0x03;
const OTA_CMD_ABORT = 0x04;

const OTA_MAGIC     = 0x4D524946; // "FIRM"

// State
let device = null;
let cid = null;
let firmwareData = null;
let firmwareMeta = '';

const $ = id => document.getElementById(id);

function log(msg, cls = 'info') {
  const el = $('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

// ─── Minimal CBOR encoder ──────────────────────────────
function cborEncode(val) {
  const buf = [];
  function enc(v) {
    if (typeof v === 'number') {
      if (Number.isInteger(v) && v >= 0) {
        if (v < 24)       buf.push(0x00 | v);
        else if (v < 256) { buf.push(0x18, v); }
        else if (v < 65536) { buf.push(0x19, v >> 8, v & 0xFF); }
        else { buf.push(0x1A, (v>>24)&0xFF, (v>>16)&0xFF, (v>>8)&0xFF, v&0xFF); }
      } else { // negative: not needed for OTA
        buf.push(0x20);
      }
    } else if (v instanceof Uint8Array || Array.isArray(v)) {
      const d = (v instanceof Uint8Array) ? v : new Uint8Array(v);
      if (d.length < 24)        buf.push(0x40 | d.length);
      else if (d.length < 256) { buf.push(0x58, d.length); }
      else                      { buf.push(0x59, d.length >> 8, d.length & 0xFF); }
      buf.push(...d);
    } else if (v instanceof Map) {
      const items = [...v.entries()];
      const mt = 0xA0 | items.length;
      buf.push(mt);
      for (const [k, val] of items) { enc(k); enc(val); }
    } else if (v instanceof Array) {
      buf.push(0x80 | v.length);
      for (const item of v) enc(item);
    }
  }
  enc(val);
  return new Uint8Array(buf);
}

/** Build the OTA CBOR payload: {0x01: cmd, 0x02: {0x01: payload}} */
function buildOtaCBOR(cmd, payload) {
  const inner = new Map();
  inner.set(0x01, payload || new Uint8Array(0));
  const outer = new Map();
  outer.set(0x01, cmd);
  outer.set(0x02, inner);
  return cborEncode(outer);
}

/** Build the full frame: [0x07] + OTA_CBOR */
function buildOtaFrame(cmd, payload) {
  const cbor = buildOtaCBOR(cmd, payload);
  const frame = new Uint8Array(1 + cbor.length);
  frame[0] = CTAP_VENDOR_OTA;
  frame.set(cbor, 1);
  return frame;
}

// ─── WebHID ─────────────────────────────────────────────
async function doConnect() {
  try {
    const filters = [{ usagePage: 0xF1D0 }];
    const devs = await navigator.hid.requestDevice({ filters });
    if (!devs.length) { log('未选择设备', 'err'); return; }
    device = devs[0];
    await device.open();
    log(`已连接: ${device.productName}`, 'ok');
    cid = await hidInit();
    log(`会话 CID: ${cid.toString(16)}`, 'info');
    $('btnConnect').disabled = true;
    $('btnInfo').disabled = false;
    $('btnFlash').disabled = !firmwareData;
  } catch (e) { log(`连接失败: ${e.message}`, 'err'); }
}

/** CTAP HID INIT exchange — get a unique channel ID */
async function hidInit() {
  const init = new Uint8Array(64);
  init.set([0xFF,0xFF,0xFF,0xFF, CTAPHID_INIT, 0, 0], 0);
  init[7] = 0x11; // nonce byte 0
  init[8] = 0x22; // nonce byte 1
  init[9] = 0x33; // nonce byte 2
  init[10]= 0x44; // nonce byte 3
  init[11]= 0x55; // nonce byte 4
  init[12]= 0x66; // nonce byte 5
  init[13]= 0x77; // nonce byte 6
  init[14]= 0x88; // nonce byte 7

  await device.sendReport(0, init);
  const resp = await readReport();
  // CID is bytes 0-3 of response
  return (resp[0]<<24)|(resp[1]<<16)|(resp[2]<<8)|resp[3];
}

function readReport() {
  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => reject(new Error('读取超时')), 15000);
    device.addEventListener('inputreport', function handler(e) {
      clearTimeout(timeout);
      device.removeEventListener('inputreport', handler);
      resolve(new Uint8Array(e.data.buffer));
    }, { once: true });
  });
}

/** Send data via CTAP HID vendor command */
async function hidSend(cmd, payload) {
  if (!device || !cid) throw new Error('未连接');
  const totalLen = payload.length;
  const initCap = 57;
  const contCap = 59;

  const pkt0 = new Uint8Array(64);
  pkt0[0] = (cid >> 24) & 0xFF;
  pkt0[1] = (cid >> 16) & 0xFF;
  pkt0[2] = (cid >> 8) & 0xFF;
  pkt0[3] = cid & 0xFF;
  pkt0[4] = cmd;
  pkt0[5] = (totalLen >> 8) & 0xFF;
  pkt0[6] = totalLen & 0xFF;
  const n0 = Math.min(totalLen, initCap);
  pkt0.set(payload.subarray(0, n0), 7);
  await device.sendReport(0, pkt0);

  let off = n0, seq = 0;
  while (off < totalLen) {
    const pkt = new Uint8Array(64);
    pkt[0] = (cid >> 24) & 0xFF;
    pkt[1] = (cid >> 16) & 0xFF;
    pkt[2] = (cid >> 8) & 0xFF;
    pkt[3] = cid & 0xFF;
    pkt[4] = seq & 0x7F;
    const n = Math.min(totalLen - off, contCap);
    pkt.set(payload.subarray(off, off + n), 5);
    await device.sendReport(0, pkt);
    off += n;
    seq++;
  }
}

/** Receive response via CTAP HID */
async function hidRecv() {
  const init = await readReport();
  const rlen = (init[5] << 8) | init[6];
  let data = init.slice(7, 7 + Math.min(rlen, 57));
  let remain = rlen - 57, seq = 0;
  while (remain > 0) {
    const pkt = await readReport();
    const n = Math.min(remain, 59);
    const tmp = new Uint8Array(data.length + n);
    tmp.set(data);
    tmp.set(pkt.subarray(5, 5 + n), data.length);
    data = tmp;
    remain -= n;
    seq++;
  }
  return data;
}

// ─── Device queries ────────────────────────────────────
async function doInfo() {
  $('btnInfo').disabled = true;
  try {
    const frame = buildOtaFrame(OTA_CMD_INFO);
    await hidSend(CTAP_VENDOR_CBOR, frame);
    const resp = await hidRecv();
    log(`收到 ${resp.length} 字节`, 'ok');

    // Parse CBOR response: {0x01: h'info', 0x02: status}
    const info = parseInfoResp(resp);
    if (info) {
      const states = ['空闲','忙','错误','完成'];
      log(`版本: ${info.major}.${info.minor}  状态: ${states[info.status]||info.status}`, 'ok');
      if (info.err) log(`错误码: ${info.err}`, 'err');
    } else {
      log('无法解析响应', 'err');
    }
  } catch (e) { log(`查询失败: ${e.message}`, 'err'); }
  $('btnInfo').disabled = false;
}

function parseInfoResp(data) {
  try {
    let off = 0;
    if ((data[off] & 0xE0) !== 0xA0) return null;
    const n = data[off] & 0x0F; off++;
    let result = {};
    for (let i = 0; i < n && off < data.length; i++) {
      const key = data[off]; off++;
      if ((data[off] & 0xE0) === 0x40) {
        const sl = data[off] & 0x1F; off++;
        const str = data.slice(off, off + sl); off += sl;
        if (key === 0x01 && str.length >= 3) {
          result = { status: str[0], major: str[1], minor: str[2], err: str.length > 3 ? str[3] : 0 };
        }
      } else if (key === 0x02) {
        result.success = data[off]; off++;
      }
    }
    return result;
  } catch(e) { return null; }
}

// ─── File handling ─────────────────────────────────────
function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  $('fileMeta').textContent = `${file.name} (${file.size} 字节)`;

  const reader = new FileReader();
  reader.onload = function(ev) {
    const raw = new Uint8Array(ev.target.result);
    if (raw.length < 104) { log(`文件过小: ${raw.length} 字节`, 'err'); return; }

    const magic = (raw[4] | (raw[5]<<8) | (raw[6]<<16) | (raw[7]<<24)) >>> 0;
    const ver   = (raw[0] | (raw[1]<<8) | (raw[2]<<16) | (raw[3]<<24)) >>> 0;
    const body  = raw.length - 104;

    if (magic !== OTA_MAGIC) { log('无效的 OTA 固件 (magic 错误)', 'err'); return; }

    firmwareData = raw;
    const verStr = `${(ver >> 8) & 0xFF}.${ver & 0xFF}`;
    firmwareMeta = `版本 ${verStr}, 固件 ${body} 字节`;
    $('fileMeta').textContent += ` — 版本 ${verStr}, 固件 ${body} 字节`;
    log(`已加载: 版本 ${verStr}, 固体数据 ${body} 字节`, 'ok');
    $('btnFlash').disabled = !device;
  };
  reader.readAsArrayBuffer(file);
}

// ─── OTA flash ─────────────────────────────────────────
async function doFlash() {
  if (!device || !firmwareData) return;

  const version  = (firmwareData[0]|(firmwareData[1]<<8)|(firmwareData[2]<<16)|(firmwareData[3]<<24))>>>0;
  const meta     = firmwareData.slice(0, 104);
  const fwBody   = firmwareData.slice(104);
  const total    = fwBody.length;

  $('btnFlash').disabled = true;
  $('progressBar').style.width = '0%';
  log(`开始 OTA 升级，${total} 字节...`, 'info');

  try {
    // Abort any in-progress OTA
    await hidSend(CTAP_VENDOR_CBOR, buildOtaFrame(OTA_CMD_ABORT));
    await hidRecv();
    await sleep(100);

    const CHUNK = 768;
    let sent = 0;

    for (let off = 0; off < total; off += CHUNK) {
      const chunk = fwBody.slice(off, off + CHUNK);
      await hidSend(CTAP_VENDOR_CBOR, buildOtaFrame(OTA_CMD_WRITE, chunk));
      await hidRecv(); // consume response
      sent += chunk.length;
      const pct = Math.round(sent * 100 / total);
      $('progressBar').style.width = pct + '%';
      if (sent % (CHUNK * 60) < CHUNK) log(`进度: ${pct}% (${sent}/${total})`, 'ok');
    }

    log('传输完成，验证签名...', 'info');
    $('progressBar').style.width = '100%';

    // Verify & activate (device will restart on success)
    await hidSend(CTAP_VENDOR_CBOR, buildOtaFrame(OTA_CMD_VERIFY, meta));
    log('OTA 完成！设备正在重启...', 'ok');

    await sleep(3000);
    try { device.close(); } catch(e) {}
    log('设备已重启，可重新连接。');
  } catch (e) {
    log(`OTA 失败: ${e.message}`, 'err');
    $('progressBar').style.width = '0%';
    $('btnFlash').disabled = false;
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
